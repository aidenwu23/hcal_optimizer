name: sweep_lhs
tag_prefix: lhs
template: geometries/templates/hcal_template.xml
detector_type: hcal
index_base: 0
outdir_generated: geometries/generated

# Keep defaults, then override per-variant
constants:
  side: -z
  dx: "100/2*cm"
  dy: "100/2*cm"
  zmin: "0.20*m"
  nLayers: 10
  t_spacer: "0.05*cm"
  spacerMaterial: "Air"
  seg1_layers: 3
  seg2_layers: 3
  seg3_layers: 4

variants: []

